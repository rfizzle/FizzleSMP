name: Companion Tests

on:
  push:
    branches: [master]
    paths:
      - 'companions/fizzle-enchanting/**'
      - '.github/workflows/companion-tests.yml'
  pull_request:
    paths:
      - 'companions/fizzle-enchanting/**'
      - '.github/workflows/companion-tests.yml'
  workflow_dispatch:

jobs:
  fizzle-enchanting:
    name: fizzle-enchanting (test + runGametest)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: companions/fizzle-enchanting
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('companions/fizzle-enchanting/**/*.gradle*', 'companions/fizzle-enchanting/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Run unit tests
        run: ./gradlew test --no-daemon

      - name: Run gametests
        run: ./gradlew runGametest --no-daemon

      - name: Upload junit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fizzle-enchanting-junit
          path: |
            companions/fizzle-enchanting/build/test-results/test/*.xml
            companions/fizzle-enchanting/build/junit-gametest.xml
            companions/fizzle-enchanting/build/reports/tests/test/

      - name: Upload gametest crash reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fizzle-enchanting-crash-reports
          path: companions/fizzle-enchanting/build/gametest/crash-reports/
