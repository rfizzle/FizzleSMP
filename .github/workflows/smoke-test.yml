name: Server Smoke Test

on:
  push:
    branches: [master]
    paths:
      - 'plugins/**'
      - 'modpack/**'
      - 'scripts/build-pack.sh'
      - '.github/workflows/smoke-test.yml'
  workflow_dispatch:

jobs:
  server-boot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install packwiz
        run: go install github.com/packwiz/packwiz@latest

      - name: Build server pack
        run: ./scripts/build-pack.sh server

      - name: Stage server
        run: |
          mkdir -p test-server
          unzip -q build/FizzleSMP-server-*.zip -d test-server
          cd test-server
          curl -sL -o fabric-installer.jar \
            https://maven.fabricmc.net/net/fabricmc/fabric-installer/1.0.1/fabric-installer-1.0.1.jar
          java -jar fabric-installer.jar server -mcversion 1.21.1 -downloadMinecraft
          echo "eula=true" > eula.txt
          cat > server.properties <<EOF
          level-type=minecraft\:flat
          online-mode=false
          max-players=1
          view-distance=4
          simulation-distance=4
          EOF

      - name: Boot server and wait for "Done"
        run: |
          cd test-server
          timeout 300 java -Xmx6G -jar fabric-server-launch.jar --nogui \
            < <(sleep 180 && echo stop) | tee server.log
          grep -q 'Done (.*)! For help' server.log || {
            echo "::error::Server failed to reach 'Done' within 3 minutes"
            exit 1
          }

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-logs
          path: |
            test-server/logs/
            test-server/server.log
            test-server/crash-reports/
